services:
  backend:
    build:
      context: ./backend
    container_name: task-manager-backend
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: task-manager-frontend
    depends_on:
      - backend
    command: npm run preview -- --host 0.0.0.0 --port 4173
    ports:
      - "4173:4173"
